    <path d="M312 318 H347"/>
    <path d="M347 318 L333 306"/>
    <path d="M347 318 L333 330"/>
    <path d="M582 318 H617"/>
    <path d="M617 318 L603 306"/>
    <path d="M617 318 L603 330"/>
    <path d="M852 318 H887"/>
