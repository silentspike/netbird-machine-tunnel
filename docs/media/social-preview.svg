    <rect x="55" y="66" width="100" height="24" rx="6" fill="#ffffff" stroke="#4338ca" stroke-width="3"/>
    <rect x="55" y="97" width="100" height="24" rx="6" fill="#ffffff" stroke="#4338ca" stroke-width="3"/>
    <text x="105" y="176" text-anchor="middle" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">NetBird</text>
    <text x="105" y="207" text-anchor="middle" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19">Management</text>
  </g>

  <g transform="translate(905 245)">
