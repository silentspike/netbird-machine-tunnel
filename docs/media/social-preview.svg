    <text x="105" y="176" text-anchor="middle" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Domain Controller</text>
    <text x="105" y="207" text-anchor="middle" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19">Kerberos, LDAP, SMB</text>
