<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">NetBird Machine Tunnel social preview</title>
  <desc id="desc">Unofficial fork preview showing a Windows laptop connecting through Machine Tunnel mTLS to NetBird Management and a Domain Controller.</desc>

  <rect width="1200" height="630" fill="#f7fafc"/>
  <rect x="48" y="48" width="1104" height="534" rx="28" fill="#ffffff" stroke="#d8e1e8" stroke-width="2"/>

  <text x="92" y="126" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">NetBird Machine Tunnel</text>
  <text x="94" y="168" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26">Unofficial fork: pre-login Windows VPN for Active Directory</text>

  <g transform="translate(95 245)">
    <rect x="0" y="0" width="210" height="145" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <rect x="42" y="34" width="126" height="78" rx="8" fill="#ffffff" stroke="#0369a1" stroke-width="3"/>
    <rect x="84" y="114" width="42" height="10" rx="4" fill="#0369a1"/>
