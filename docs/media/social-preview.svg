    <text x="105" y="90" text-anchor="middle" fill="#15803d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">mTLS</text>
    <text x="105" y="176" text-anchor="middle" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Machine Tunnel</text>
    <text x="105" y="207" text-anchor="middle" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19">machine certificate</text>
  </g>

  <g transform="translate(635 245)">
