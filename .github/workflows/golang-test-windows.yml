name: "Windows"

on:
  push:
    branches:
      - main
  pull_request:

env:
  downloadPath: '${{ github.workspace }}\temp'
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || github.actor_id }}
  cancel-in-progress: true

jobs:
  test:
    name: "Windows / Client / Unit"
    runs-on: windows-latest
    steps:
      - name: Enable long paths
        run: git config --system core.longpaths true

      - name: Clean workspace
        run: |
          if (Test-Path "${{ github.workspace }}\.git") {
            Write-Host "Removing stale .git directory..."
            Remove-Item -Recurse -Force "${{ github.workspace }}\.git" -ErrorAction SilentlyContinue
          }

      - name: Checkout code
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          clean: true
          persist-credentials: false

      - name: Retry checkout on failure
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          clean: true
          persist-credentials: false

      - name: Install Go
        uses: actions/setup-go@v6
        id: go
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Get Go environment
        run: |
          echo "cache=$(go env GOCACHE)" >> $env:GITHUB_ENV
          echo "modcache=$(go env GOMODCACHE)" >> $env:GITHUB_ENV

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.cache }}
            ${{ env.modcache }}
          key: ${{ runner.os }}-gotest-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-gotest-
            ${{ runner.os }}-go-

      - name: Download wintun
        uses: carlosperate/download-file-action@v2
        id: download-wintun
        with:
          file-url: https://pkgs.netbird.io/wintun/wintun-0.14.1.zip
          file-name: wintun.zip
          location: ${{ env.downloadPath }}
          sha256: '07c256185d6ee3652e09fa55c0b673e2624b565e02c4b9091c79ca7d2f24ef51'

      - name: Decompressing wintun files
        run: tar -zvxf "${{ steps.download-wintun.outputs.file-path }}" -C ${{ env.downloadPath }}

      - run: mv ${{ env.downloadPath }}/wintun/bin/amd64/wintun.dll 'C:\Windows\System32\'

      - name: Install sysinternals (with retry)
        run: |
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            choco install -y sysinternals --ignore-checksums
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Attempt $i failed, retrying in 15 seconds..."
            Start-Sleep -Seconds 15
          }
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Install mingw (with retry)
        run: |
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            choco install -y mingw
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Attempt $i failed, retrying in 15 seconds..."
            Start-Sleep -Seconds 15
          }
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - run: PsExec64 -s -w ${{ github.workspace }} C:\hostedtoolcache\windows\go\${{ steps.go.outputs.go-version }}\x64\bin\go.exe env -w GOMODCACHE=${{ env.cache }}
      - run: PsExec64 -s -w ${{ github.workspace }} C:\hostedtoolcache\windows\go\${{ steps.go.outputs.go-version }}\x64\bin\go.exe env -w GOCACHE=${{ env.modcache }}
      - run: PsExec64 -s -w ${{ github.workspace }} C:\hostedtoolcache\windows\go\${{ steps.go.outputs.go-version }}\x64\bin\go.exe mod tidy
      # [FORK EXTENSION] Write package list to file instead of env var.
      # Upstream uses a single env var + cmd.exe call, but our Machine Tunnel
      # packages push the command line beyond cmd.exe's 8191 char limit.
      # This is functionally equivalent: same packages, same filter criteria.
      # Upstream ref: netbirdio/netbird .github/workflows/golang-test-windows.yml
      - name: Write package list
        run: |
          go list ./... | Where-Object { $_ -notmatch '/management' } | Where-Object { $_ -notmatch '/relay' } | Where-Object { $_ -notmatch '/signal' } | Where-Object { $_ -notmatch '/proxy' } | Where-Object { $_ -notmatch '/combined' } | Out-File -FilePath packages.txt -Encoding utf8

      # [FORK EXTENSION] Test in batches of 30 packages via PsExec64.
      # Upstream runs all packages in a single cmd.exe invocation which works
      # for fewer packages but exceeds cmd.exe's 8191 char limit with our
      # additional Machine Tunnel packages. Same test flags are preserved:
      # -tags=devcert -timeout 10m -p 1 (serialized execution).
      #
      # CRITICAL: Output redirect must happen INSIDE the PsExec/SYSTEM session
      # via cmd.exe /c "... >> test-out.txt 2>&1". PowerShell capture
      # ($output = & PsExec64 ...) loses go test stdout because PsExec does
      # not relay the child process output to the calling process reliably.
      # This matches upstream's pattern: PsExec64 -s ... cmd.exe /c "... > test-out.txt 2>&1"
      - name: test
        run: |
          $goPath = "C:\hostedtoolcache\windows\go\${{ steps.go.outputs.go-version }}\x64\bin\go.exe"
          $packages = Get-Content packages.txt | Where-Object { $_.Trim() -ne "" }
          $batchSize = 30
          $exitCode = 0

          # Ensure clean output file
          if (Test-Path test-out.txt) { Remove-Item test-out.txt }

          for ($i = 0; $i -lt $packages.Count; $i += $batchSize) {
            $batch = $packages[$i..([Math]::Min($i + $batchSize - 1, $packages.Count - 1))]
            $batchNum = [Math]::Floor($i / $batchSize) + 1
            $batchStr = $batch -join " "
            Write-Host "Testing batch $batchNum ($($batch.Count) packages)..."

            # Redirect INSIDE PsExec session so go test output is captured
            & PsExec64 -s -w ${{ github.workspace }} cmd.exe /c "$goPath test -tags=devcert -timeout 10m -p 1 $batchStr >> test-out.txt 2>&1"

            if ($LASTEXITCODE -ne 0) {
              Write-Host "Batch $batchNum failed with exit code $LASTEXITCODE"
              $exitCode = $LASTEXITCODE
            }
          }

          exit $exitCode

      - name: test output
        if: ${{ always() }}
        run: Get-Content test-out.txt
