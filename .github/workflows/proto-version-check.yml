name: Proto Version Check

on:
  pull_request:
    paths:
      - "**/*.pb.go"
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  check-proto-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for proto tool version changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          echo "Checking generated proto version strings between $BASE_SHA and $HEAD_SHA"
          diff_output=$(git diff "$BASE_SHA" "$HEAD_SHA" -- '*.pb.go' || true)

          if [ -z "$diff_output" ]; then
            echo "No generated proto changes detected"
            exit 0
          fi

          version_changes=$(printf '%s\n' "$diff_output" | grep -E '^\+[[:space:]]*//[[:space:]]+protoc(-gen-go|-gen-go-grpc)?[[:space:]]+v[0-9.]+' || true)

          if [ -z "$version_changes" ]; then
            echo "No added proto version string changes detected"
            exit 0
          fi

          invalid_versions=$(printf '%s\n' "$version_changes" | grep -Ev '^\+[[:space:]]*//[[:space:]]+(protoc-gen-go[[:space:]]+v1\.36\.11|protoc-gen-go[[:space:]]+v1\.36\.6|protoc-gen-go[[:space:]]+v1\.26\.0|protoc-gen-go-grpc[[:space:]]+v1\.6\.1|protoc[[:space:]]+v7\.34\.1|protoc[[:space:]]+v6\.33\.3|protoc[[:space:]]+v6\.33\.1)$' || true)

          if [ -n "$invalid_versions" ]; then
            echo "Generated proto files use unexpected tool versions."
            echo "Allowed versions: protoc v7.34.1/v6.33.3/v6.33.1, protoc-gen-go v1.36.11/v1.36.6/v1.26.0, protoc-gen-go-grpc v1.6.1."
            printf '%s\n' "$invalid_versions"
            exit 1
          fi

          echo "Generated proto version strings use allowed tool versions"
