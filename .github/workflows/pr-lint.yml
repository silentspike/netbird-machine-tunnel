name: PR Lint

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  conventional-commits:
    # Validates PR title matches [tag] format (upstream pr-title-check.yml)
    # OR conventional commit format (fork compatibility)
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        uses: actions/github-script@v9
        with:
          script: |
            const title = context.payload.pull_request.title;

            // Upstream [tag] format: [misc] description
            const tagPattern = /^\[([^\]]+)\]\s+.+/;
            // Conventional Commit format: type: description
            const ccPattern = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert|deps)(\(.+\))?:\s+.+/;

            if (tagPattern.test(title) || ccPattern.test(title)) {
              console.log('PR title format is valid');
              return;
            }

            core.setFailed(
              `PR title must use either:\n` +
              `  [tag] format: [misc] description\n` +
              `  Conventional Commits: type: description\n` +
              `Current title: "${title}"`
            );
