name: Upstream Sync Check

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC
  workflow_dispatch:      # Manual trigger

# Required permissions for pushing branches and creating PRs
# Note: 'workflows' permission requires PAT, not available via GITHUB_TOKEN
# Workflow file conflicts must be resolved manually
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      needs_sync: ${{ steps.check.outputs.needs_sync }}
      upstream_version: ${{ steps.check.outputs.upstream_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for upstream updates
        id: check
        run: |
          git remote add upstream https://github.com/netbirdio/netbird.git || true
          git fetch upstream --tags

          # Get latest upstream release tag (vX.Y.Z format)
          UPSTREAM_VERSION=$(git tag -l 'v*' --sort=-v:refname | head -1)
          echo "Latest upstream version: $UPSTREAM_VERSION"
          echo "upstream_version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT

          # Check if the selected release tag is already contained in this branch.
          # Do not use commit message matching; manual sync commits may use a different format.
          if git merge-base --is-ancestor "$UPSTREAM_VERSION" HEAD; then
            echo "Already synced to $UPSTREAM_VERSION"
            echo "needs_sync=false" >> $GITHUB_OUTPUT
          else
            echo "New version available: $UPSTREAM_VERSION"
            echo "needs_sync=true" >> $GITHUB_OUTPUT
          fi

  create-sync-pr:
    needs: check-upstream
    if: needs.check-upstream.outputs.needs_sync == 'true'
    runs-on: ubuntu-latest
    outputs:
      merge_status: ${{ steps.sync.outputs.merge_status }}
      branch_name: ${{ steps.sync.outputs.branch_name }}
      conflict_files: ${{ steps.sync.outputs.conflict_files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream and create sync branch
        id: sync
        run: |
          git remote add upstream https://github.com/netbirdio/netbird.git || true
          git fetch upstream --tags

          VERSION="${{ needs.check-upstream.outputs.upstream_version }}"
          BRANCH_NAME="sync/upstream-${VERSION}"

          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

          # Check if branch already exists
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
            echo "Branch $BRANCH_NAME already exists"
            echo "branch_exists=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          git checkout -b "$BRANCH_NAME"

          # Attempt tag merge - capture conflict info.
          # Public fork syncs must target the selected release tag, not upstream/main.
          if git merge "$VERSION" --no-edit 2>&1; then
            echo "merge_status=clean" >> $GITHUB_OUTPUT
            echo "conflict_files=" >> $GITHUB_OUTPUT
          else
            echo "merge_status=conflicts" >> $GITHUB_OUTPUT

            # List conflicted files
            CONFLICTS=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
            echo "conflict_files=$CONFLICTS" >> $GITHUB_OUTPUT
            echo "Conflicted files: $CONFLICTS"

            # Check if any conflicts are in .github/workflows (can't push those)
            WORKFLOW_CONFLICTS=$(echo "$CONFLICTS" | grep -o '.github/workflows/[^ ]*' || true)
            if [ -n "$WORKFLOW_CONFLICTS" ]; then
              echo "workflow_conflicts=true" >> $GITHUB_OUTPUT
              echo "::warning::Workflow files have conflicts - these need manual resolution with PAT"
              # Reset workflow files to our version (keep ours)
              for f in $WORKFLOW_CONFLICTS; do
                if [ -f "$f" ]; then
                  git checkout --ours "$f" 2>/dev/null || true
                  git add "$f"
                fi
              done
            fi

            # Stage everything including conflicts for commit
            git add -A
            git commit -m "sync: Upstream NetBird $VERSION (CONFLICTS - needs manual resolution)" --no-verify || true
          fi

          # Push the branch
          git push -u origin "$BRANCH_NAME"

      - name: Create Pull Request
        if: steps.sync.outputs.branch_exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-upstream.outputs.upstream_version }}"
          BRANCH="${{ steps.sync.outputs.branch_name }}"
          STATUS="${{ steps.sync.outputs.merge_status }}"
          CONFLICTS="${{ steps.sync.outputs.conflict_files }}"

          if [ "$STATUS" = "clean" ]; then
            STATUS_TEXT="✅ Clean merge - ready for review"
            CONFLICT_SECTION=""
          else
            STATUS_TEXT="⚠️ CONFLICTS - Manual resolution required"
            CONFLICT_SECTION="### Conflicted Files

          \`\`\`
          $CONFLICTS
          \`\`\`

          ### How to Resolve

          1. Check out this branch locally:
             \`\`\`bash
             git fetch origin
             git checkout $BRANCH
             \`\`\`

          2. Look for \`// === MACHINE-TUNNEL-FORK\` markers in conflicted files

          3. Resolve conflicts, keeping our marked sections

          4. Commit and push:
             \`\`\`bash
             git add -A
             git commit -m \"resolve: Merge conflicts for $VERSION\"
             git push
             \`\`\`"
          fi

          gh pr create \
            --title "sync: Upstream NetBird $VERSION" \
            --label "upstream-sync" \
            --label "automated" \
            --body "## Automated Upstream Sync

          New NetBird version detected: **$VERSION**

          ### Merge Status: $STATUS_TEXT

          $CONFLICT_SECTION

          ### Review Checklist

          - [ ] CI passes (all tests green)
          - [ ] Changes in \`management/server/\` reviewed (our mTLS code intact)
          - [ ] Windows VM test passed (if server changes)
          - [ ] No regressions in Machine Tunnel functionality

          ### Our Modified Files (preserve these!)

          Files marked with \`// === MACHINE-TUNNEL-FORK\`:
          - \`management/internals/server/server.go\` - mTLS server initialization
          - \`management/server/peer.go\` - mTLS auth + DNS labels

          ---
          *This PR was created automatically by the upstream-sync workflow.*"

  notify-on-failure:
    needs: [check-upstream, create-sync-pr]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create Issue on Failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-upstream.outputs.upstream_version }}"

          gh issue create \
            --title "⚠️ Upstream sync failed for $VERSION" \
            --label "upstream-sync" \
            --label "bug" \
            --body "## Upstream Sync Workflow Failed

          The automated upstream sync workflow failed for version **$VERSION**.

          ### What to do

          1. Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details
          2. Manually sync if needed:
             \`\`\`bash
             git fetch upstream
             git checkout -b sync/upstream-$VERSION
             git merge $VERSION
             # Resolve conflicts
             git push -u origin sync/upstream-$VERSION
             \`\`\`

          ### Common Issues

          - **Permission denied**: Check workflow permissions
          - **Merge conflicts**: Need manual resolution
          - **Branch exists**: Delete old sync branch first"
